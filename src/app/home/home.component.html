<mat-card>
  <mat-card-title>My Active Tasks</mat-card-title>
  <mat-card-content>
    <div *ngIf="activeTasks.length">
      <div *ngFor="let task of activeTasks" class="task-row">
        <a [routerLink]="['/tasks', task.id]">{{ task.title }}</a>
        <button mat-raised-button color="primary" (click)="completeTask(task.id)">Complete</button>
      </div>
    </div>
    <p *ngIf="!activeTasks.length">🎉 No active tasks</p>
  </mat-card-content>
</mat-card>
