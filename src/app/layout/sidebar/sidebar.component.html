<mat-nav-list>

  <a mat-list-item routerLink="/dashboard" routerLinkActive="active">
    <mat-icon>dashboard</mat-icon>
    <span>Dashboard</span>
  </a>

  <div class="sidebar-group">
    <div class="sidebar-group-header" (click)="toggleTasksGroup()">
      <mat-icon>task</mat-icon>
      <span>Tasks</span>
      <span class="sidebar-group-spacer"></span>
      <mat-icon>{{ tasksExpanded ? 'expand_less' : 'expand_more' }}</mat-icon>
    </div>

    <div class="sidebar-subitem" *ngIf="tasksExpanded">
      <a mat-list-item routerLink="/tasks" routerLinkActive="active">
        <span>Task List</span>
      </a>
    </div>

    <div class="sidebar-subitem" *ngIf="tasksExpanded">
      <a mat-list-item routerLink="/create-task" routerLinkActive="active">
        <span>Create Task</span>
      </a>
    </div>
  </div>

  <div class="sidebar-group">
    <div class="sidebar-group-header" (click)="toggleFamilyGroup()">
      <mat-icon>family_restroom</mat-icon>
      <span>Family</span>
      <span class="sidebar-group-spacer"></span>
      <mat-icon>{{ familyExpanded ? 'expand_less' : 'expand_more' }}</mat-icon>
    </div>

    <div class="sidebar-subitem" *ngIf="familyExpanded">
      <a mat-list-item routerLink="/family" routerLinkActive="active">
        <span>Family</span>
      </a>
    </div>

    <div class="sidebar-subitem" *ngIf="familyExpanded">
      <a mat-list-item routerLink="/household-profile" routerLinkActive="active">
        <span>Household Profile</span>
      </a>
    </div>
  </div>

  <mat-list-item routerLink="/insights">
    <mat-icon>analytics</mat-icon>
    <span>Insights</span>
</mat-list-item>

  <a mat-list-item routerLink="/calendar" routerLinkActive="active">
    <mat-icon>calendar_month</mat-icon>
    <span>Calendar</span>
  </a>

  <a mat-list-item routerLink="/settings" routerLinkActive="active">
    <mat-icon>settings</mat-icon>
    <span>Settings</span>
  </a>

</mat-nav-list>
